<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - GOLAOWN</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Premium Header -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <img src="./assets/images/Logo.jpeg" alt="GOLAOWN Logo" class="logo-img">
                <span class="logo-text">GOLA<span class="text-gold">OWN</span></span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="shop.html" class="nav-link">Shop</a>
                <a href="account.html" class="nav-link">Account</a>
            </nav>
        </div>
    </header>

    <div class="account-container mt-8" style="max-width: 500px; margin: 4rem auto; padding: 2rem;">
        <div class="auth-card-premium">
            <div class="auth-form-premium">
                <h2 style="margin-bottom: 1rem;">Reset Password</h2>
                <p style="color: var(--text-light); margin-bottom: 2rem; font-size: 0.9rem;">Enter the email address associated with your account and we'll send you a link to reset your password.</p>
                
                <form id="forgotPasswordForm">
                    <div class="form-group-premium full">
                        <label>Email Address</label>
                        <input type="email" id="reset-email" required placeholder="your@email.com">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-full mt-4">Send Reset Link</button>
                    <div style="text-align: center; margin-top: 1.5rem;">
                        <a href="account.html" style="color: var(--text-light); text-decoration: none; font-size: 0.9rem;"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    </div>
                </form>

                <div id="success-message" style="display: none; text-align: center;">
                    <div style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;"><i class="fas fa-check-circle"></i></div>
                    <h3>Link Sent!</h3>
                    <p style="color: var(--text-light); margin-top: 1rem;">If an account exists with that email, you will receive a reset link shortly.</p>
                    <a href="account.html" class="btn btn-secondary mt-4">Return to Login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="api-client.js"></script>
    <script>
        document.getElementById('forgotPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const btn = e.target.querySelector('button');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            // Simulate API call
            setTimeout(() => {
                document.getElementById('forgotPasswordForm').style.display = 'none';
                document.getElementById('success-message').style.display = 'block';
                window.api.showNotification('Reset link sent to your email.');
            }, 1500);
        });
    </script>
</body>
</html>
